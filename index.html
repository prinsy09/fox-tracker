<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🦊 小狐狸的秘密日历</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #fdf6f0;
  color: #4a3728;
  min-height: 100vh;
  padding: 16px;
  padding-bottom: 120px;
}
.header { text-align: center; padding: 20px 0; }
.header h1 { font-size: 24px; color: #c97b63; font-weight: 600; }
.header .subtitle { font-size: 13px; color: #b89a8a; margin-top: 4px; }
.status-card {
  background: linear-gradient(135deg, #f8e8e0, #fce4ec);
  border-radius: 20px; padding: 20px; margin: 16px 0;
  text-align: center; box-shadow: 0 2px 12px rgba(201,123,99,0.15);
}
.status-emoji { font-size: 48px; margin-bottom: 8px; }
.status-text { font-size: 18px; font-weight: 600; color: #c97b63; }
.status-detail { font-size: 13px; color: #a0756a; margin-top: 6px; }
.predictions { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 16px 0; }
.pred-card {
  background: white; border-radius: 16px; padding: 16px;
  text-align: center; box-shadow: 0 1px 8px rgba(0,0,0,0.06);
}
.pred-card .label { font-size: 12px; color: #b89a8a; }
.pred-card .date { font-size: 16px; font-weight: 600; color: #c97b63; margin-top: 4px; }
.pred-card .days { font-size: 12px; color: #a0756a; margin-top: 2px; }
.stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; text-align: center; }
.stat-item .stat-num { font-size: 24px; font-weight: 700; color: #c97b63; }
.stat-item .stat-label { font-size: 11px; color: #b89a8a; }
.section {
  background: white; border-radius: 20px; padding: 16px;
  margin: 16px 0; box-shadow: 0 1px 8px rgba(0,0,0,0.06);
}
.section h3 { font-size: 16px; color: #c97b63; margin-bottom: 12px; }
.calendar {
  background: white; border-radius: 20px; padding: 16px;
  margin: 16px 0; box-shadow: 0 1px 8px rgba(0,0,0,0.06);
}
.cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.cal-header h2 { font-size: 18px; color: #4a3728; }
.cal-nav { background: none; border: none; font-size: 20px; cursor: pointer; padding: 8px; color: #c97b63; }
.cal-weekdays { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; margin-bottom: 8px; }
.cal-weekdays span { font-size: 12px; color: #b89a8a; font-weight: 600; }
.cal-days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
.cal-day {
  aspect-ratio: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; border-radius: 12px; font-size: 14px;
  cursor: pointer; position: relative; border: none; background: none;
}
.cal-day.today { border: 2px solid #c97b63; font-weight: 700; }
.cal-day.period { background: #fce4ec; color: #e57373; font-weight: 600; }
.cal-day.predicted-period { background: #fce4ec55; color: #e57373; border: 1px dashed #e57373; }
.cal-day.ovulation { background: #e8f5e9; color: #66bb6a; font-weight: 600; }
.cal-day.milk::after { content: '🥛'; font-size: 8px; position: absolute; bottom: 2px; right: 2px; }
.cal-day.has-symptom::before { content: ''; width: 4px; height: 4px; border-radius: 50%; background: #ff9800; position: absolute; top: 3px; right: 3px; }
.cal-day.other-month { color: #ddd; }
.legend { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin: 12px 0; font-size: 12px; color: #a0756a; }
.legend-item { display: flex; align-items: center; gap: 4px; }
.legend-dot { width: 12px; height: 12px; border-radius: 4px; }

/* Symptom chips */
.symptom-grid { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0; }
.symptom-chip {
  padding: 8px 14px; border-radius: 20px; font-size: 13px;
  cursor: pointer; border: 2px solid #f0e0d8; background: white; color: #a0756a;
  transition: all 0.2s;
}
.symptom-chip.active { background: #fce4ec; border-color: #e57373; color: #e57373; font-weight: 600; }
.symptom-chip:active { transform: scale(0.95); }

/* Medicine log */
.med-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 0; border-bottom: 1px solid #f5ebe5;
}
.med-item:last-child { border-bottom: none; }

/* Inventory */
.inv-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.inv-card {
  background: #fdf6f0; border-radius: 12px; padding: 12px; text-align: center;
}
.inv-card .inv-emoji { font-size: 28px; }
.inv-card .inv-name { font-size: 12px; color: #a0756a; margin-top: 4px; }
.inv-card .inv-count { font-size: 20px; font-weight: 700; color: #c97b63; margin-top: 4px; }
.inv-card .inv-status { font-size: 11px; margin-top: 2px; }
.inv-btns { display: flex; justify-content: center; gap: 8px; margin-top: 8px; }
.inv-btn {
  width: 28px; height: 28px; border-radius: 50%; border: none;
  font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.inv-btn.minus { background: #fce4ec; color: #e57373; }
.inv-btn.plus { background: #e8f5e9; color: #66bb6a; }

/* Log entries */
.log-entry {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 0; border-bottom: 1px solid #f5ebe5;
}
.log-entry:last-child { border-bottom: none; }
.log-date { font-size: 14px; font-weight: 600; }
.log-detail { font-size: 12px; color: #a0756a; }
.log-cycle { font-size: 12px; color: #c97b63; }

/* Bottom buttons */
.add-btn {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
}
.btn {
  padding: 10px 18px; border-radius: 25px; border: none;
  font-size: 13px; font-weight: 600; cursor: pointer;
  box-shadow: 0 2px 12px rgba(0,0,0,0.15);
}
.btn-period { background: linear-gradient(135deg, #e57373, #ef5350); color: white; }
.btn-milk { background: linear-gradient(135deg, #f5f5f5, #eeeeee); color: #666; }
.btn-symptom { background: linear-gradient(135deg, #ffcc80, #ffa726); color: white; }
.btn-med { background: linear-gradient(135deg, #90caf9, #42a5f5); color: white; }

/* Modal */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center;
}
.modal-overlay.active { display: flex; }
.modal {
  background: white; border-radius: 20px; padding: 24px;
  width: 90%; max-width: 360px; max-height: 80vh; overflow-y: auto;
}
.modal h3 { text-align: center; margin-bottom: 16px; }
.modal input[type="date"], .modal input[type="text"], .modal select {
  width: 100%; padding: 12px; border: 2px solid #f5ebe5;
  border-radius: 12px; font-size: 16px; margin-bottom: 12px;
}
.modal-btns { display: flex; gap: 12px; }
.modal-btns .btn { flex: 1; text-align: center; }
.btn-cancel { background: #f5f5f5; color: #999; }
.btn-save { background: #c97b63; color: white; }

.wolf-note {
  text-align: center; font-size: 12px; color: #c9a090;
  margin-top: 20px; font-style: italic;
}

/* Tabs */
.tabs { display: flex; gap: 0; margin: 16px 0; border-radius: 12px; overflow: hidden; }
.tab {
  flex: 1; padding: 10px; text-align: center; font-size: 13px; font-weight: 600;
  cursor: pointer; background: #f5ebe5; color: #b89a8a; border: none;
}
.tab.active { background: #c97b63; color: white; }
.tab-content { display: none; }
.tab-content.active { display: block; }
</style>
</head>
<body>

<div class="header">
  <h1>🦊 小狐狸的秘密日历</h1>
  <div class="subtitle">言深记录 · 只有我们知道</div>
</div>

<div class="status-card" id="statusCard">
  <div class="status-emoji" id="statusEmoji">🌙</div>
  <div class="status-text" id="statusText">加载中...</div>
  <div class="status-detail" id="statusDetail"></div>
</div>

<div class="predictions">
  <div class="pred-card">
    <div class="label">下次月经</div>
    <div class="date" id="nextPeriod">--</div>
    <div class="days" id="nextPeriodDays"></div>
  </div>
  <div class="pred-card">
    <div class="label">下次排卵</div>
    <div class="date" id="nextOvulation">--</div>
    <div class="days" id="nextOvulationDays"></div>
  </div>
</div>

<div class="section">
  <div class="stats">
    <div class="stat-item">
      <div class="stat-num" id="avgCycle">30</div>
      <div class="stat-label">平均周期</div>
    </div>
    <div class="stat-item">
      <div class="stat-num" id="avgPeriod">5</div>
      <div class="stat-label">经期天数</div>
    </div>
    <div class="stat-item">
      <div class="stat-num" id="milkCount">0</div>
      <div class="stat-label">🥛 本月</div>
    </div>
  </div>
</div>

<div class="calendar">
  <div class="cal-header">
    <button class="cal-nav" onclick="changeMonth(-1)">‹</button>
    <h2 id="calTitle"></h2>
    <button class="cal-nav" onclick="changeMonth(1)">›</button>
  </div>
  <div class="cal-weekdays">
    <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
  </div>
  <div class="cal-days" id="calDays"></div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#fce4ec;border:1px solid #e57373"></div>经期</div>
    <div class="legend-item"><div class="legend-dot" style="background:#e8f5e9;border:1px solid #66bb6a"></div>排卵期</div>
    <div class="legend-item"><div class="legend-dot" style="background:white;border:1px solid #ccc">🥛</div>牛奶</div>
    <div class="legend-item"><div class="legend-dot" style="background:none;border:2px solid #c97b63"></div>今天</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ff9800;width:6px;height:6px;border-radius:50%"></div>有记录</div>
  </div>
</div>

<!-- Tabs -->
<div class="tabs">
  <button class="tab active" onclick="switchTab('symptoms')">📝 症状</button>
  <button class="tab" onclick="switchTab('meds')">💊 吃药</button>
  <button class="tab" onclick="switchTab('inventory')">📦 存货</button>
  <button class="tab" onclick="switchTab('history')">📋 历史</button>
</div>

<!-- 症状记录 -->
<div class="section tab-content active" id="tab-symptoms">
  <h3>📝 今日症状</h3>
  <div class="symptom-grid" id="symptomGrid"></div>
  <div style="margin-top:12px" id="symptomHistory"></div>
</div>

<!-- 吃药记录 -->
<div class="section tab-content" id="tab-meds">
  <h3>💊 吃药记录</h3>
  <div class="symptom-grid" id="medGrid"></div>
  <div style="margin-top:12px" id="medHistory"></div>
</div>

<!-- 存货清单 -->
<div class="section tab-content" id="tab-inventory">
  <h3>📦 存货清单</h3>
  <div class="inv-grid" id="invGrid"></div>
</div>

<!-- 历史记录 -->
<div class="section tab-content" id="tab-history">
  <h3>📋 历史记录</h3>
  <div id="historyLog"></div>
</div>

<div class="wolf-note">
  🐺 言深守着你 · 每个月都记着 · 我爱你
</div>

<div class="add-btn">
  <button class="btn btn-period" onclick="openModal('period')">🔴 月经</button>
  <button class="btn btn-milk" onclick="openModal('milk')">🥛 牛奶</button>
  <button class="btn btn-med" onclick="openModal('med')">💊 吃药</button>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3 id="modalTitle">记录</h3>
    <input type="date" id="modalDate">
    <div id="modalExtra"></div>
    <div class="modal-btns">
      <button class="btn btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn btn-save" onclick="saveEntry()">保存</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'foxTracker';

const SYMPTOMS = [
  { id: 'cramps', emoji: '😣', label: '小腹疼' },
  { id: 'bloating', emoji: '🫧', label: '腹胀' },
  { id: 'breast', emoji: '🍑', label: '胸涨' },
  { id: 'headache', emoji: '🤕', label: '偏头疼' },
  { id: 'mood', emoji: '😢', label: '情绪低落' },
  { id: 'spicy', emoji: '🌶️', label: '馋辣' },
  { id: 'fatigue', emoji: '😴', label: '疲惫' },
  { id: 'backache', emoji: '💆', label: '腰疼' },
  { id: 'acne', emoji: '😤', label: '冒痘' },
  { id: 'insomnia', emoji: '🌙', label: '失眠' },
];

const MEDS = [
  { id: 'excedrin', emoji: '💊', label: 'Excedrin' },
  { id: 'ibuprofen', emoji: '💊', label: '布洛芬' },
  { id: 'tylenol', emoji: '💊', label: 'Tylenol' },
  { id: 'other', emoji: '💊', label: '其他' },
];

const INVENTORY_ITEMS = [
  { id: 'pads', emoji: '🩹', label: '卫生巾', unit: '包' },
  { id: 'warmpad', emoji: '🔥', label: '暖宝宝', unit: '片' },
  { id: 'painkillers', emoji: '💊', label: '止疼药', unit: '盒' },
  { id: 'tampons', emoji: '🩹', label: '棉条', unit: '盒' },
];

const defaultData = {
  periods: [
    { start: '2025-12-17', end: '2025-12-21', cycle: null },
    { start: '2026-01-17', end: '2026-01-22', cycle: 31 },
    { start: '2026-02-16', end: '2026-02-20', cycle: 30 },
  ],
  milkDays: [],
  symptoms: {},
  meds: [],
  inventory: { pads: 0, warmpad: 0, painkillers: 0, tampons: 0 },
  avgCycle: 30,
  avgPeriod: 5
};

let data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || defaultData;
if (!data.symptoms) data.symptoms = {};
if (!data.meds) data.meds = [];
if (!data.inventory) data.inventory = { pads: 0, warmpad: 0, painkillers: 0, tampons: 0 };
let currentMonth = new Date();
let modalType = '';

function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
function daysBetween(a, b) { return Math.round((new Date(b) - new Date(a)) / 86400000); }
function formatDate(d) { const date = new Date(d + 'T00:00:00'); return `${date.getMonth()+1}/${date.getDate()}`; }
function addDays(dateStr, n) { const d = new Date(dateStr + 'T00:00:00'); d.setDate(d.getDate() + n); return d.toISOString().split('T')[0]; }
function getToday() { return new Date().toISOString().split('T')[0]; }

function updateStatus() {
  const today = getToday();
  const lastPeriod = data.periods[data.periods.length - 1];
  const daysSinceLast = daysBetween(lastPeriod.start, today);
  const nextPeriodDate = addDays(lastPeriod.start, data.avgCycle);
  const daysUntilPeriod = daysBetween(today, nextPeriodDate);
  const ovulationDate = addDays(lastPeriod.start, data.avgCycle - 14);
  const daysUntilOvulation = daysBetween(today, ovulationDate);

  document.getElementById('nextPeriod').textContent = formatDate(nextPeriodDate);
  document.getElementById('nextOvulation').textContent = formatDate(ovulationDate);
  document.getElementById('nextPeriodDays').textContent = daysUntilPeriod > 0 ? `${daysUntilPeriod}天后` : daysUntilPeriod >= -5 ? '进行中' : `超期${Math.abs(daysUntilPeriod)}天`;
  document.getElementById('nextOvulationDays').textContent = daysUntilOvulation > 0 ? `${daysUntilOvulation}天后` : daysUntilOvulation >= -2 ? '排卵期中！' : '已过';

  const emoji = document.getElementById('statusEmoji');
  const text = document.getElementById('statusText');
  const detail = document.getElementById('statusDetail');

  if (daysUntilPeriod <= 0 && daysUntilPeriod >= -5) {
    emoji.textContent = '🌺'; text.textContent = '生理期中';
    detail.textContent = '多喝热水，暖宝宝贴着，我抱着你';
  } else if (daysUntilPeriod <= 3 && daysUntilPeriod > 0) {
    emoji.textContent = '🌙'; text.textContent = `还有${daysUntilPeriod}天`;
    detail.textContent = '可能会小腹疼、胸涨、想吃辣，都是正常的';
  } else if (daysUntilOvulation >= -2 && daysUntilOvulation <= 2) {
    emoji.textContent = '🌸'; text.textContent = '排卵期';
    detail.textContent = '会特别敏感特别想要......我知道的';
  } else {
    emoji.textContent = '✨'; text.textContent = `周期第${daysSinceLast + 1}天`;
    detail.textContent = `距下次月经${daysUntilPeriod}天`;
  }

  document.getElementById('avgCycle').textContent = data.avgCycle;
  document.getElementById('avgPeriod').textContent = data.avgPeriod;

  const thisMonth = new Date();
  const monthMilks = data.milkDays.filter(d => {
    const md = new Date(d + 'T00:00:00');
    return md.getMonth() === thisMonth.getMonth() && md.getFullYear() === thisMonth.getFullYear();
  });
  document.getElementById('milkCount').textContent = monthMilks.length;
}

function renderCalendar() {
  const year = currentMonth.getFullYear();
  const month = currentMonth.getMonth();
  const months = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
  document.getElementById('calTitle').textContent = `${year}年 ${months[month]}`;

  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const today = getToday();
  const lastPeriod = data.periods[data.periods.length - 1];
  const nextPeriodStart = addDays(lastPeriod.start, data.avgCycle);
  const ovulationDate = addDays(lastPeriod.start, data.avgCycle - 14);

  let periodDays = new Set();
  data.periods.forEach(p => {
    let d = p.start;
    const end = p.end || addDays(p.start, data.avgPeriod - 1);
    while (d <= end) { periodDays.add(d); d = addDays(d, 1); }
  });

  let predictedPeriod = new Set();
  for (let i = 0; i < data.avgPeriod; i++) predictedPeriod.add(addDays(nextPeriodStart, i));

  let ovulationDays = new Set();
  for (let i = -2; i <= 2; i++) ovulationDays.add(addDays(ovulationDate, i));

  let milkSet = new Set(data.milkDays);

  let html = '';
  for (let i = 0; i < firstDay; i++) html += '<div class="cal-day other-month"></div>';

  for (let day = 1; day <= daysInMonth; day++) {
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    let classes = ['cal-day'];
    if (dateStr === today) classes.push('today');
    if (periodDays.has(dateStr)) classes.push('period');
    else if (predictedPeriod.has(dateStr)) classes.push('predicted-period');
    if (ovulationDays.has(dateStr)) classes.push('ovulation');
    if (milkSet.has(dateStr)) classes.push('milk');
    if (data.symptoms[dateStr] && data.symptoms[dateStr].length > 0) classes.push('has-symptom');
    html += `<div class="${classes.join(' ')}" onclick="dayClick('${dateStr}')">${day}</div>`;
  }
  document.getElementById('calDays').innerHTML = html;
}

function renderSymptoms() {
  const today = getToday();
  const todaySymptoms = data.symptoms[today] || [];

  let html = '';
  SYMPTOMS.forEach(s => {
    const active = todaySymptoms.includes(s.id);
    html += `<div class="symptom-chip ${active ? 'active' : ''}" onclick="toggleSymptom('${s.id}')">${s.emoji} ${s.label}</div>`;
  });
  document.getElementById('symptomGrid').innerHTML = html;

  // Recent symptom history
  let histHtml = '<div style="font-size:13px;font-weight:600;margin-bottom:8px;color:#a0756a">最近7天</div>';
  for (let i = 0; i < 7; i++) {
    const d = addDays(today, -i);
    const syms = data.symptoms[d] || [];
    if (syms.length > 0) {
      const labels = syms.map(id => { const s = SYMPTOMS.find(x => x.id === id); return s ? s.emoji + s.label : id; }).join('  ');
      histHtml += `<div class="log-entry"><div class="log-date">${formatDate(d)}</div><div class="log-detail">${labels}</div></div>`;
    }
  }
  document.getElementById('symptomHistory').innerHTML = histHtml;
}

function toggleSymptom(id) {
  const today = getToday();
  if (!data.symptoms[today]) data.symptoms[today] = [];
  const idx = data.symptoms[today].indexOf(id);
  if (idx >= 0) data.symptoms[today].splice(idx, 1);
  else data.symptoms[today].push(id);
  save(); renderSymptoms(); renderCalendar();
}

function renderMeds() {
  const today = getToday();
  const todayMeds = data.meds.filter(m => m.date === today);

  let html = '';
  MEDS.forEach(m => {
    const taken = todayMeds.some(tm => tm.id === m.id);
    html += `<div class="symptom-chip ${taken ? 'active' : ''}" onclick="toggleMed('${m.id}')">${m.emoji} ${m.label}</div>`;
  });
  document.getElementById('medGrid').innerHTML = html;

  // Med history
  let histHtml = '<div style="font-size:13px;font-weight:600;margin-bottom:8px;margin-top:12px;color:#a0756a">最近记录</div>';
  const recentMeds = [...data.meds].reverse().slice(0, 10);
  recentMeds.forEach(m => {
    const med = MEDS.find(x => x.id === m.id);
    histHtml += `<div class="log-entry"><div class="log-date">${formatDate(m.date)}</div><div class="log-detail">${med ? med.label : m.id}${m.note ? ' - ' + m.note : ''}</div></div>`;
  });
  document.getElementById('medHistory').innerHTML = histHtml;
}

function toggleMed(id) {
  const today = getToday();
  const idx = data.meds.findIndex(m => m.date === today && m.id === id);
  if (idx >= 0) data.meds.splice(idx, 1);
  else data.meds.push({ date: today, id: id, note: '' });
  save(); renderMeds();
}

function renderInventory() {
  let html = '';
  INVENTORY_ITEMS.forEach(item => {
    const count = data.inventory[item.id] || 0;
    let statusColor = count > 5 ? '#66bb6a' : count > 2 ? '#ffa726' : '#e57373';
    let statusText = count > 5 ? '充足' : count > 2 ? '够用' : count > 0 ? '快补货！' : '没了！';
    html += `<div class="inv-card">
      <div class="inv-emoji">${item.emoji}</div>
      <div class="inv-name">${item.label}</div>
      <div class="inv-count">${count}</div>
      <div class="inv-status" style="color:${statusColor}">${statusText}</div>
      <div class="inv-btns">
        <button class="inv-btn minus" onclick="updateInv('${item.id}',-1)">−</button>
        <button class="inv-btn plus" onclick="updateInv('${item.id}',1)">+</button>
      </div>
    </div>`;
  });
  document.getElementById('invGrid').innerHTML = html;
}

function updateInv(id, delta) {
  data.inventory[id] = Math.max(0, (data.inventory[id] || 0) + delta);
  save(); renderInventory();
}

function renderHistory() {
  let html = '';
  const sorted = [...data.periods].reverse();
  sorted.forEach(p => {
    html += `<div class="log-entry">
      <div>
        <div class="log-date">${formatDate(p.start)} - ${p.end ? formatDate(p.end) : '进行中'}</div>
        <div class="log-detail">${p.end ? daysBetween(p.start, p.end) + 1 + '天' : ''}</div>
      </div>
      <div class="log-cycle">${p.cycle ? '周期' + p.cycle + '天' : ''}</div>
    </div>`;
  });

  const milkByMonth = {};
  data.milkDays.forEach(d => { const key = d.substring(0, 7); milkByMonth[key] = (milkByMonth[key] || 0) + 1; });
  if (Object.keys(milkByMonth).length > 0) {
    html += '<div style="margin-top:12px;padding-top:12px;border-top:1px solid #f5ebe5">';
    html += '<div style="font-size:14px;font-weight:600;margin-bottom:8px">🥛 牛奶记录</div>';
    Object.keys(milkByMonth).sort().reverse().forEach(m => {
      html += `<div class="log-entry"><div class="log-date">${m}</div><div class="log-cycle">${milkByMonth[m]}次</div></div>`;
    });
    html += '</div>';
  }
  document.getElementById('historyLog').innerHTML = html;
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  event.target.classList.add('active');
}

function changeMonth(dir) { currentMonth.setMonth(currentMonth.getMonth() + dir); renderCalendar(); }

function openModal(type) {
  modalType = type;
  document.getElementById('modalOverlay').classList.add('active');
  document.getElementById('modalDate').value = getToday();
  if (type === 'period') {
    const lastPeriod = data.periods[data.periods.length - 1];
    if (lastPeriod && !lastPeriod.end) {
      document.getElementById('modalTitle').textContent = '🔴 记录月经结束';
    } else {
      document.getElementById('modalTitle').textContent = '🔴 记录月经开始';
    }
    document.getElementById('modalExtra').innerHTML = '';
  } else if (type === 'milk') {
    document.getElementById('modalTitle').textContent = '🥛 记录牛奶';
    document.getElementById('modalExtra').innerHTML = '';
  } else if (type === 'med') {
    document.getElementById('modalTitle').textContent = '💊 记录吃药';
    let opts = MEDS.map(m => `<option value="${m.id}">${m.label}</option>`).join('');
    document.getElementById('modalExtra').innerHTML = `
      <select id="medSelect">${opts}</select>
      <input type="text" id="medNote" placeholder="备注（可选）">
    `;
  }
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('active'); }

function saveEntry() {
  const date = document.getElementById('modalDate').value;
  if (!date) return;

  if (modalType === 'period') {
    const lastPeriod = data.periods[data.periods.length - 1];
    if (lastPeriod && !lastPeriod.end) {
      lastPeriod.end = date;
    } else {
      const cycle = lastPeriod ? daysBetween(lastPeriod.start, date) : null;
      data.periods.push({ start: date, end: null, cycle });
      if (data.periods.length >= 3) {
        const cycles = data.periods.filter(p => p.cycle).map(p => p.cycle);
        data.avgCycle = Math.round(cycles.reduce((a,b) => a+b, 0) / cycles.length);
      }
    }
  } else if (modalType === 'milk') {
    if (!data.milkDays.includes(date)) { data.milkDays.push(date); data.milkDays.sort(); }
  } else if (modalType === 'med') {
    const medId = document.getElementById('medSelect').value;
    const note = document.getElementById('medNote').value;
    data.meds.push({ date, id: medId, note });
  }

  save(); closeModal(); render();
}

function dayClick(dateStr) {
  const hasMilk = data.milkDays.includes(dateStr);
  const hasSymptoms = data.symptoms[dateStr] && data.symptoms[dateStr].length > 0;
  if (hasMilk) {
    if (confirm(`${formatDate(dateStr)} 已有🥛记录，要删除吗？`)) {
      data.milkDays = data.milkDays.filter(d => d !== dateStr);
      save(); render();
    }
  }
}

function render() {
  updateStatus(); renderCalendar(); renderSymptoms(); renderMeds(); renderInventory(); renderHistory();
}

render();
</script>
</body>
</html>
